name: Generate UML Diagrams
on:
  push:
    branches:
      - main

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Pylint
        run: pip install pylint

      - name: Create Diagram Metadata
        run: |
          mkdir -p diagrams
          # This reads your demo.py and creates the text instructions for the diagram
          pyreverse -o puml -p srbd_project demo.py
          mv classes_srbd_project.puml diagrams/classes.puml

      - name: Render PlantUML to PNG
        uses: cloudbees/plantuml-github-action@master
        with:
          args: -v -tpng diagrams/classes.puml

      - name: Save Image to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add diagrams/*.png
          git commit -m "Update UML diagrams" || echo "No changes to commit"
          git push